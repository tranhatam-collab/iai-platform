name                     = "app-iai-one"
compatibility_date       = "2024-09-23"
compatibility_flags      = ["nodejs_compat"]
pages_build_output_dir   = ".vercel/output/static"

[env.production]
vars = { IAI_ENV = "production", APP_URL = "https://app.iai.one", API_URL = "https://api.iai.one", CDN_URL = "https://cdn.iai.one" }

[env.preview]
vars = { IAI_ENV = "preview", API_URL = "https://api.iai.one", CDN_URL = "https://cdn.iai.one" }

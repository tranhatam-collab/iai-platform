# ═══════════════════════════════════════════════════════════════
#  Mailcow nginx extension for IAI Mail API
#
#  This file is installed as:
#    data/conf/nginx/site.iai-mail-api.custom
#
#  It extends Mailcow's default site.conf so the same hostname can serve:
#    /               → Mailcow admin + webmail
#    /api/v1/*       → Native Mailcow API
#    /_mail/*        → IAI Mail API
#
#  Request flow:
#    CF Worker / app → https://mail.iai.one/_mail/emails
#      → nginx-mailcow → iai-mail-api:3000 → postfix-mailcow:25
# ═══════════════════════════════════════════════════════════════

location = /_mail/emails {
    proxy_pass         http://iai-mail-api:3000/emails;
    proxy_http_version 1.1;
    proxy_set_header   Host              $http_host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    client_max_body_size 5m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "POST, GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    if ($request_method = OPTIONS) {
        return 204;
    }
}


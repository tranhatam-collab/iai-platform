# ═══════════════════════════════════════════════════════════════
#  Nginx config for mail.iai.one
#
#  /api/*  → IAI Mail API (localhost:3000)
#  /*      → Mailcow admin (localhost:8080, managed by mailcow)
#
#  Note: Mailcow runs its own nginx on :443 for webmail/admin.
#  This config handles ONLY the /api path as a reverse proxy
#  on a separate port (8443) that Cloudflare proxies.
#
#  Architecture:
#    Internet → Cloudflare → mail.iai.one:443 → Mailcow (admin/webmail)
#    CF Worker → mail.iai.one/api/send → This nginx → IAI Mail API :3000
# ═══════════════════════════════════════════════════════════════

# Mailcow already binds :443 (don't fight it)
# We use port 8080 for the API proxy, then Cloudflare routes /api/* there.
# OR: we add a location block inside Mailcow's nginx.

# ── Option A: standalone server on port 8080 (if Mailcow takes :443) ─
server {
    listen 8080;
    server_name mail.iai.one;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy no-referrer;

    # Rate limit
    limit_req_zone $binary_remote_addr zone=mail_api:10m rate=30r/m;

    location /api/ {
        limit_req zone=mail_api burst=10 nodelay;

        # Strip /api prefix before forwarding
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # CORS for Cloudflare Workers
        add_header Access-Control-Allow-Origin  "https://api.iai.one" always;
        add_header Access-Control-Allow-Methods "POST, GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location /health {
        proxy_pass http://127.0.0.1:3000/health;
    }

    location = /help {
        return 302 https://docs.iai.one/mail/;
    }

    location = /docs {
        return 302 https://docs.iai.one/mail/;
    }

    location / {
        return 301 https://mail.iai.one$request_uri;
    }
}


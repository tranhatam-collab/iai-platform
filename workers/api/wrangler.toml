name = "iai-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# ── D1 Database ──────────────────────────────────────────
[[d1_databases]]
binding      = "DB"
database_name = "iai-flow-core-prod"
database_id  = "912d7b4d-7ce5-4ab7-bc4e-056faab71a22"

# ── KV Namespaces ─────────────────────────────────────────
[[kv_namespaces]]
binding    = "CACHE"
id         = "a0a1e1cfe04c48f2a7499f3b0e9e72d3"
preview_id = "f5ee4493fe5648b1a71f2ebd4e846061"

[[kv_namespaces]]
binding    = "SESSIONS"
id         = "af295fb413344912adb73c9ddd4c1462"
preview_id = "2c5ab0541c5c493198007b21deb5b450"

# ── R2 Bucket ─────────────────────────────────────────────
[[r2_buckets]]
binding             = "MEDIA"
bucket_name         = "iai-media"
preview_bucket_name = "iai-media-preview"

# ── Env vars (non-secret) ─────────────────────────────────
[vars]
ALLOWED_ORIGINS = "https://app.iai.one,https://www.app.iai.one,https://iai.one,https://www.iai.one,https://ai.muonnoi.org"
N8N_BASE_URL    = "https://flows.iai.one"
SELF_URL        = "https://api.iai.one"
APP_URL         = "https://app.iai.one"
IAI_ENV         = "production"

# ── Dev environment ───────────────────────────────────────
[env.production]
workers_dev = false
vars = { IAI_ENV = "production", ALLOWED_ORIGINS = "https://app.iai.one,https://www.app.iai.one,https://iai.one,https://www.iai.one,https://ai.muonnoi.org", N8N_BASE_URL = "https://flows.iai.one", SELF_URL = "https://api.iai.one", APP_URL = "https://app.iai.one" }

[[env.production.routes]]
pattern = "api.iai.one"
custom_domain = true

[[env.production.d1_databases]]
binding       = "DB"
database_name = "iai-flow-core-prod"
database_id   = "912d7b4d-7ce5-4ab7-bc4e-056faab71a22"

[[env.production.kv_namespaces]]
binding    = "CACHE"
id         = "a0a1e1cfe04c48f2a7499f3b0e9e72d3"
preview_id = "f5ee4493fe5648b1a71f2ebd4e846061"

[[env.production.kv_namespaces]]
binding    = "SESSIONS"
id         = "af295fb413344912adb73c9ddd4c1462"
preview_id = "2c5ab0541c5c493198007b21deb5b450"

[[env.production.r2_buckets]]
binding             = "MEDIA"
bucket_name         = "iai-media"
preview_bucket_name = "iai-media-preview"

[env.dev]
workers_dev = true
vars = { IAI_ENV = "development", ALLOWED_ORIGINS = "http://localhost:3000,http://127.0.0.1:3000,http://localhost:8788", N8N_BASE_URL = "http://localhost:5678", SELF_URL = "http://127.0.0.1:8787", APP_URL = "http://127.0.0.1:3000" }

[[env.dev.d1_databases]]
binding       = "DB"
database_name = "iai-db"
database_id   = "f48947b8-b917-42be-8632-1edab48b7172"

[[env.dev.kv_namespaces]]
binding    = "CACHE"
id         = "f5ee4493fe5648b1a71f2ebd4e846061"
preview_id = "f5ee4493fe5648b1a71f2ebd4e846061"

[[env.dev.kv_namespaces]]
binding    = "SESSIONS"
id         = "2c5ab0541c5c493198007b21deb5b450"
preview_id = "2c5ab0541c5c493198007b21deb5b450"

[[env.dev.r2_buckets]]
binding             = "MEDIA"
bucket_name         = "iai-media-preview"
preview_bucket_name = "iai-media-preview"

[env.preview]
workers_dev = true
vars = { IAI_ENV = "preview", ALLOWED_ORIGINS = "*", N8N_BASE_URL = "https://flows.iai.one", SELF_URL = "https://api.iai.one", APP_URL = "https://app.iai.one" }

[[env.preview.d1_databases]]
binding       = "DB"
database_name = "iai-flow-core-preview"
database_id   = "f48947b8-b917-42be-8632-1edab48b7172"

[[env.preview.kv_namespaces]]
binding    = "CACHE"
id         = "f5ee4493fe5648b1a71f2ebd4e846061"
preview_id = "f5ee4493fe5648b1a71f2ebd4e846061"

[[env.preview.kv_namespaces]]
binding    = "SESSIONS"
id         = "2c5ab0541c5c493198007b21deb5b450"
preview_id = "2c5ab0541c5c493198007b21deb5b450"

[[env.preview.r2_buckets]]
binding             = "MEDIA"
bucket_name         = "iai-media-preview"
preview_bucket_name = "iai-media-preview"

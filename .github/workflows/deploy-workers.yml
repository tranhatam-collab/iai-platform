name: Deploy IAI Workers → Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - 'packages/**'
      - 'scripts/**'
      - 'package.json'

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    name: Deploy API Worker

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root deps
        run: npm install --legacy-peer-deps

      - name: Type check API worker
        run: npm run typecheck
        working-directory: workers/api

      - name: Deploy API Worker
        run: npx wrangler deploy --env production --keep-vars
        working-directory: workers/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  sync-db:
    runs-on: ubuntu-latest
    name: Sync D1 Schema
    needs: deploy-api
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root deps
        run: npm install --legacy-peer-deps

      - name: Sync D1 schema + seed
        run: node scripts/d1-setup.mjs prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
